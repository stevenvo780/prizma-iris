# EMW Backend – servicios auxiliares DEV
# DB: pgram en humanizar2 (100.98.5.11:5432) via NetBird VPN
services:
  redis:
    image: redis:7-alpine
    container_name: emw-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
